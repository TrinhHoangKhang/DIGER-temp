dataset: yelp
seed: 2020
reproducibility: true
log_dir: ./logs

map_path: .emb_map.json
semantic_emb_path: Yelp.emb-llama.npy
semantic_hidden_size: 4096
code_num: 256
code_length: 4

epochs: 200
lr_rec: 0.001
weight_decay: 0.05

joint_optimization: true
end_to_end: true
freeze_semantic_embedding: true
use_indicator_ste: true
freeze_id_epochs: 0
lr_id: 0.00001
gumbel_tau: 1.5

code_loss_weight: 1.0
recon_loss_weight: 1.0
vq_loss_weight: 1.0
qs_loss_weight: 0
kl_loss_weight: 0.0
dec_cl_loss_weight: 0.0
qs_beta: 0.25

sim: cos
alpha: 1
tau: 0.07
loss_type: mse

warmup_steps: 500
batch_size: 256
eval_batch_size: 16
num_workers: 8
eval_step: 1
learner: AdamW
data_path: ./dataset
lr_scheduler_type: cosine
gradient_accumulation_steps: 1

max_his_len: 50
early_stop: 20

metrics: recall@1,recall@5,ndcg@5,recall@10,ndcg@10
valid_metric: ndcg@10

max_length: 210
encoder_layers: 6
decoder_layers: 6
d_model: 128
d_ff: 512
num_heads: 4
d_kv: 64
dropout_rate: 0.1
activation_function: relu
feed_forward_proj: relu
num_beams: 80

rqvae_path: ./rqvae_ckpt/yelp/best_collision_model.pth

num_emb_list: [256, 256, 256]
beta: 0.25
e_dim: 256
layers: [2048, 1024, 512]
vq_type: vq
dist: l2
kmeans_init: false
kmeans_iters: 100
dropout_prob: 0.0
bn: false
sk_epsilons: [0.003, 0.003, 0.003]
sk_iters: 50

use_gaq: false
gaq_gamma: 0.6
gaq_eps: 1e-7
